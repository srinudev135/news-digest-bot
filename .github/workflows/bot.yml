name: Daily News Digest Bot

on:
  schedule:
    - cron: "30 1 * * *"   # 7:00 AM IST = 01:30 UTC exactly
  workflow_dispatch:        # manual trigger anytime

concurrency:
  group: telegram-bot
  cancel-in-progress: true  # kills old instance before starting new one

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55     # stays alive 55 mins for follow-up chat after digest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (sends digest on startup, then stays for chat)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot.py
